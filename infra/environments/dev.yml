# dev.yml — development environment config
# First-time setup order:
#   1. Edit this file (fill in project_id, submitter_email)
#   2. Run: ../../scripts/bootstrap.sh dev
#   3. Run: ./tf.sh dev init
#   4. Run: ./tf.sh dev apply

project_id: redpitaya-fpga-builds
region: australia-southeast1
environment: dev
submitter_email: rcoaic@gmail.com

# Terraform state bucket — created by bootstrap.sh before terraform init.
# Must match what bootstrap.sh creates: {project_id}-fpga-tfstate
tfstate_bucket: redpitaya-fpga-builds-fpga-tfstate

installer_bucket_name: redpitaya-fpga-builds-fpga-installer
subnet_cidr: 10.152.0.0/20

apis:
  - cloudresourcemanager.googleapis.com
  - iam.googleapis.com
  - compute.googleapis.com
  - storage.googleapis.com
  - batch.googleapis.com
  - logging.googleapis.com
  - billingbudgets.googleapis.com

# Set billing_account to enable budget alerts (gcloud billing accounts list)
billing_account: ""
budget_usd: 20

# Build artifacts are auto-deleted after this many days
artifact_retention_days: 30
